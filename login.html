<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Guardian — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #030712;
      --bg2:      #0c1524;
      --cyan:     #06b6d4;
      --cyan-dim: rgba(6,182,212,.18);
      --amber:    #f59e0b;
      --danger:   #ef4444;
      --success:  #10b981;
      --glass:    rgba(6,182,212,.07);
      --brd:      rgba(6,182,212,.22);
      --text:     #e2e8f0;
      --text-dim: rgba(226,232,240,.55);
    }

    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ── STARFIELD ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at  8%  14%, rgba(6,182,212,.9) 0, transparent 100%),
        radial-gradient(1px 1px at 22%  72%, rgba(245,158,11,.8) 0, transparent 100%),
        radial-gradient(1px 1px at 45%  30%, #fff .5px, transparent 100%),
        radial-gradient(1px 1px at 58%  85%, rgba(6,182,212,.7) 0, transparent 100%),
        radial-gradient(1px 1px at 73%  19%, #fff .5px, transparent 100%),
        radial-gradient(1px 1px at 88%  54%, rgba(245,158,11,.6) 0, transparent 100%),
        radial-gradient(1px 1px at 12%  91%, #fff .5px, transparent 100%),
        radial-gradient(1px 1px at 33%  47%, rgba(6,182,212,.5) 0, transparent 100%),
        radial-gradient(1px 1px at 64%  62%, #fff .5px, transparent 100%),
        radial-gradient(1px 1px at 92%  38%, rgba(245,158,11,.5) 0, transparent 100%),
        radial-gradient(2px 2px at 50%  10%, rgba(6,182,212,.4) 0, transparent 100%),
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(6,182,212,.07) 0, transparent 70%);
      animation: starPulse 8s ease-in-out infinite alternate;
    }
    @keyframes starPulse { 0% { opacity: .6; } 100% { opacity: 1; } }

    /* ── CARD ── */
    .login-container {
      position: relative; z-index: 1;
      background: var(--glass);
      border: 1px solid var(--brd);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(6,182,212,.12), 0 0 120px rgba(6,182,212,.05);
      padding: 2.5rem;
      width: 100%; max-width: 420px;
      text-align: center;
      animation: cardIn .55s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes cardIn {
      from { transform: translateY(24px) scale(.96); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    /* ── LOGO ── */
    .game-logo {
      font-family: 'Exo 2', sans-serif;
      font-weight: 900; font-size: 2.4rem;
      letter-spacing: .1em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--amber), var(--cyan));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      margin-bottom: .4rem;
    }
    @keyframes shimmer { 0% { background-position: 0 center; } 100% { background-position: 200% center; } }

    .game-subtitle {
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-dim); font-size: .82rem;
      letter-spacing: .06em; margin-bottom: 2rem;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--brd); gap: 0;
    }
    .tab {
      flex: 1; padding: 10px;
      background: transparent; border: none;
      font-family: 'Exo 2', sans-serif; font-weight: 700;
      font-size: .9rem; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; transition: all .25s; color: var(--text-dim);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── FORMS ── */
    .form-container { display: none; animation: fadeIn .35s ease; }
    .form-container.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .form-group { margin-bottom: 1.25rem; text-align: left; }
    .form-label {
      display: block; margin-bottom: .45rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .78rem; letter-spacing: .08em; color: var(--cyan);
      text-transform: uppercase;
    }

    .input-wrapper { position: relative; }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: rgba(3,7,18,.7);
      border: 1px solid var(--brd); border-radius: 8px;
      color: var(--text); font-size: .95rem;
      font-family: 'Share Tech Mono', monospace;
      transition: all .25s;
    }
    .form-input:focus {
      outline: none; border-color: var(--cyan);
      box-shadow: 0 0 14px rgba(6,182,212,.25);
    }
    .form-input::placeholder { color: var(--text-dim); }

    .password-toggle {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 16px; line-height: 1;
      transition: color .2s;
    }
    .password-toggle:hover { color: var(--cyan); }

    .strength-meter {
      height: 3px; background: rgba(255,255,255,.1);
      border-radius: 2px; margin-top: 6px; overflow: hidden;
    }
    .strength-fill { height: 100%; width: 0%; transition: all .3s; border-radius: 2px; }
    .strength-weak   { background: var(--danger); }
    .strength-medium { background: var(--amber); }
    .strength-strong { background: var(--success); }

    /* ── BUTTONS ── */
    .form-btn {
      width: 100%; padding: 12px;
      background: var(--glass);
      border: 1px solid var(--brd); border-radius: 8px;
      color: var(--cyan); font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: .9rem; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer;
      transition: all .25s; margin-bottom: .85rem;
    }
    .form-btn:hover:not(:disabled) {
      border-color: var(--cyan); background: var(--cyan-dim);
      box-shadow: 0 0 18px rgba(6,182,212,.3); transform: translateY(-2px);
    }
    .form-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .guest-btn { color: var(--text-dim); border-color: rgba(226,232,240,.2); }
    .guest-btn:hover:not(:disabled) {
      color: var(--amber); border-color: var(--amber);
      background: rgba(245,158,11,.1); box-shadow: 0 0 18px rgba(245,158,11,.2);
    }

    /* ── MESSAGES ── */
    .error-message {
      background: rgba(239,68,68,.12); color: #f87171;
      border: 1px solid rgba(239,68,68,.4);
      padding: 10px 14px; border-radius: 8px; margin: 10px 0;
      font-size: .85rem; font-family: 'Share Tech Mono', monospace;
      animation: shake .4s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .success-message {
      background: rgba(16,185,129,.12); color: #34d399;
      border: 1px solid rgba(16,185,129,.4);
      padding: 10px 14px; border-radius: 8px; margin: 10px 0;
      font-size: .85rem; font-family: 'Share Tech Mono', monospace;
      animation: slideDown .4s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-8px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    .loading {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 50%; border-top-color: #fff;
      animation: spin .9s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .privacy-notice {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem; color: var(--text-dim);
      margin-top: 1.5rem; line-height: 1.5;
      border-top: 1px solid var(--brd); padding-top: 1rem;
    }

    @media (max-width: 480px) {
      .login-container { padding: 2rem 1.5rem; }
      .game-logo { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="game-logo">🌌 Stellar Guardian</div>
  <p class="game-subtitle">Accedi per salvare i progressi e competere</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login', this)">Accedi</button>
    <button class="tab" onclick="showTab('register', this)">Registrati</button>
  </div>

  <!-- Login -->
  <div class="form-container active" id="loginForm">
    <div class="form-group">
      <label class="form-label" for="loginUsername">Username</label>
      <input type="text" id="loginUsername" class="form-input" placeholder="Inserisci il tuo username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="loginPassword">Password</label>
      <div class="input-wrapper">
        <input type="password" id="loginPassword" class="form-input" placeholder="Inserisci la password" autocomplete="current-password">
        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">👁️</button>
      </div>
    </div>
    <button class="form-btn" onclick="handleLogin()" id="loginBtn">🔑 Accedi</button>
    <button class="form-btn guest-btn" onclick="loginAsGuest()">👤 Gioca come Ospite</button>
  </div>

  <!-- Registrazione -->
  <div class="form-container" id="registerForm">
    <div class="form-group">
      <label class="form-label" for="regUsername">Username</label>
      <input type="text" id="regUsername" class="form-input" placeholder="Scegli un username (min. 3 caratteri)" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="regPassword">Password</label>
      <div class="input-wrapper">
        <input type="password" id="regPassword" class="form-input" placeholder="Crea una password (min. 6 caratteri)" oninput="checkPasswordStrength()" autocomplete="new-password">
        <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">👁️</button>
      </div>
      <div class="strength-meter">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="regPasswordConfirm">Conferma Password</label>
      <div class="input-wrapper">
        <input type="password" id="regPasswordConfirm" class="form-input" placeholder="Ripeti la password" autocomplete="new-password">
        <button type="button" class="password-toggle" onclick="togglePassword('regPasswordConfirm')">👁️</button>
      </div>
    </div>
    <button class="form-btn" onclick="handleRegister()" id="registerBtn">📝 Registrati</button>
  </div>

  <div id="messageContainer"></div>

  <div class="privacy-notice">
    // I dati vengono salvati localmente nel browser.<br>
    // Nessuna informazione viene trasmessa a server esterni.
  </div>
</div>

<script>
// TODO: implementare hashing lato server — btoa è solo encoding, non sicurezza reale
function hashPwd(p) { return btoa(unescape(encodeURIComponent(p))); }
function checkPwd(input, stored) { return hashPwd(input) === stored; }

let users = JSON.parse(localStorage.getItem('numeroquest_users') || '[]');

document.addEventListener('DOMContentLoaded', checkExistingSession);

function checkExistingSession() {
  const currentUser = localStorage.getItem('numeroquest_current_user');
  const sessionExpiry = localStorage.getItem('numeroquest_session_expiry');
  if (currentUser && sessionExpiry && Date.now() < parseInt(sessionExpiry)) {
    redirectToGame();
  }
}

function showTab(tabName, clickedEl) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (clickedEl) clickedEl.classList.add('active');
  document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
  document.getElementById(tabName + 'Form').classList.add('active');
  clearMessages();
}

function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  const toggle = input.nextElementSibling;
  if (input.type === 'password') { input.type = 'text'; toggle.textContent = '🙈'; }
  else { input.type = 'password'; toggle.textContent = '👁️'; }
}

function checkPasswordStrength() {
  const password = document.getElementById('regPassword').value;
  const fill = document.getElementById('strengthFill');
  let strength = 0;
  if (password.length >= 6) strength += 25;
  if (/[a-z]/.test(password)) strength += 25;
  if (/[A-Z]/.test(password)) strength += 25;
  if (/[0-9]/.test(password)) strength += 25;
  fill.style.width = strength + '%';
  fill.className = 'strength-fill ' + (strength <= 25 ? 'strength-weak' : strength <= 75 ? 'strength-medium' : 'strength-strong');
}

function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) { showError('Inserisci username e password'); return; }
  showLoading('loginBtn', 'Accesso in corso...');
  setTimeout(() => {
    const user = users.find(u => u.username === username && checkPwd(password, u.password));
    if (user) { loginSuccess(user); }
    else { showError('Username o password non corretti'); hideLoading('loginBtn', '🔑 Accedi'); }
  }, 600);
}

function handleRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirmPassword = document.getElementById('regPasswordConfirm').value;
  if (!username || !password) { showError('Username e password sono obbligatori'); return; }
  if (username.length < 3) { showError("Username: min. 3 caratteri"); return; }
  if (password.length < 6) { showError("Password: min. 6 caratteri"); return; }
  if (password !== confirmPassword) { showError("Le password non corrispondono"); return; }
  if (users.find(u => u.username === username)) { showError('Username già in uso'); return; }
  showLoading('registerBtn', 'Registrazione...');
  setTimeout(() => {
    const newUser = {
      id: Date.now().toString(),
      username,
      password: hashPwd(password),
      createdAt: new Date().toISOString()
    };
    users.push(newUser);
    localStorage.setItem('numeroquest_users', JSON.stringify(users));
    showSuccess('Registrazione completata! Accesso in corso...');
    setTimeout(() => loginSuccess(newUser), 1200);
  }, 600);
}

function loginAsGuest() {
  const guestUser = { id: 'guest_' + Date.now(), username: 'Ospite', isGuest: true };
  showSuccess('Accesso come ospite...');
  setTimeout(() => loginSuccess(guestUser), 800);
}

function loginSuccess(user) {
  localStorage.setItem('numeroquest_current_user', JSON.stringify(user));
  localStorage.setItem('numeroquest_session_expiry', (Date.now() + 24 * 60 * 60 * 1000).toString());
  // XSS-safe: costruiamo il messaggio senza innerHTML sulla variabile username
  const msg = document.createElement('div');
  msg.className = 'success-message';
  msg.textContent = 'Benvenuto, ' + user.username + '! Reindirizzamento...';
  const container = document.getElementById('messageContainer');
  container.innerHTML = '';
  container.appendChild(msg);
  setTimeout(redirectToGame, 1500);
}

function redirectToGame() { window.location.href = 'index.html'; }

function showLoading(btnId, text) {
  const btn = document.getElementById(btnId);
  btn.innerHTML = '<span class="loading"></span>' + text;
  btn.disabled = true;
}
function hideLoading(btnId, originalText) {
  const btn = document.getElementById(btnId);
  btn.innerHTML = originalText;
  btn.disabled = false;
}
function showError(message) {
  const container = document.getElementById('messageContainer');
  const el = document.createElement('div');
  el.className = 'error-message';
  el.textContent = message;
  container.innerHTML = '';
  container.appendChild(el);
  setTimeout(() => { container.innerHTML = ''; }, 5000);
}
function showSuccess(message) {
  const container = document.getElementById('messageContainer');
  const el = document.createElement('div');
  el.className = 'success-message';
  el.textContent = message;
  container.innerHTML = '';
  container.appendChild(el);
}
function clearMessages() { document.getElementById('messageContainer').innerHTML = ''; }

document.addEventListener('keypress', function(e) {
  if (e.key !== 'Enter') return;
  const activeForm = document.querySelector('.form-container.active');
  if (activeForm?.id === 'loginForm') handleLogin();
  else handleRegister();
});
</script>
</body>
</html>
